<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded shadow-lg w-96">
    
    <!-- Login Form -->
    <div id="loginSection">
      <h1 class="text-2xl font-bold mb-6 text-center text-blue-700">School Admin Login</h1>
      <form id="loginForm" class="space-y-4">
        <input id="username" type="text" placeholder="Username" class="border p-2 w-full rounded" required>
        <input id="password" type="password" placeholder="Password" class="border p-2 w-full rounded" required>
        <button type="submit" class="bg-blue-600 text-white p-2 w-full rounded font-bold">Login</button>
        <p id="loginError" class="text-red-500 text-sm text-center"></p>
      </form>
      <button onclick="showForgotPassword()" class="block text-center text-blue-600 text-sm mt-4 w-full hover:underline">
        Forgot Password?
      </button>
    </div>

    <!-- Forgot Password Form -->
    <div id="forgotSection" class="hidden">
      <h1 class="text-2xl font-bold mb-6 text-center text-blue-700">Forgot Password</h1>
      <form id="forgotForm" class="space-y-4">
        <input id="forgotUsername" type="text" placeholder="Enter Username" class="border p-2 w-full rounded" required>
        <button type="submit" class="bg-blue-600 text-white p-2 w-full rounded font-bold">Send Reset Token</button>
        <p id="forgotError" class="text-red-500 text-sm text-center"></p>
        <p id="forgotSuccess" class="text-green-600 text-sm text-center"></p>
      </form>
      <button onclick="showLogin()" class="block text-center text-blue-600 text-sm mt-4 w-full hover:underline">
        Back to Login
      </button>
    </div>

    <!-- Reset Password Form -->
    <div id="resetSection" class="hidden">
      <h1 class="text-2xl font-bold mb-6 text-center text-blue-700">Reset Password</h1>
      <form id="resetForm" class="space-y-4">
        <input id="resetUsername" type="text" placeholder="Username" class="border p-2 w-full rounded" required>
        <input id="resetToken" type="text" placeholder="Reset Token" class="border p-2 w-full rounded" required>
        <input id="newPassword" type="password" placeholder="New Password" class="border p-2 w-full rounded" required>
        <input id="confirmPassword" type="password" placeholder="Confirm Password" class="border p-2 w-full rounded" required>
        <button type="submit" class="bg-blue-600 text-white p-2 w-full rounded font-bold">Reset Password</button>
        <p id="resetError" class="text-red-500 text-sm text-center"></p>
        <p id="resetSuccess" class="text-green-600 text-sm text-center"></p>
      </form>
      <button onclick="showLogin()" class="block text-center text-blue-600 text-sm mt-4 w-full hover:underline">
        Back to Login
      </button>
    </div>

  </div>
  
      <script src="js/config.js"></script>

  <script>
    const API_BASE = window.API_BASE_URL || "http://localhost:5000"

    /* Toggle Functions */
    function showForgotPassword() {
      document.getElementById("loginSection").classList.add("hidden")
      document.getElementById("forgotSection").classList.remove("hidden")
      document.getElementById("resetSection").classList.add("hidden")
    }

    function showResetPassword() {
      document.getElementById("loginSection").classList.add("hidden")
      document.getElementById("forgotSection").classList.add("hidden")
      document.getElementById("resetSection").classList.remove("hidden")
    }

    function showLogin() {
      document.getElementById("loginSection").classList.remove("hidden")
      document.getElementById("forgotSection").classList.add("hidden")
      document.getElementById("resetSection").classList.add("hidden")
      document.getElementById("loginError").textContent = ""
      document.getElementById("forgotError").textContent = ""
      document.getElementById("forgotSuccess").textContent = ""
      document.getElementById("resetError").textContent = ""
      document.getElementById("resetSuccess").textContent = ""
    }

    /* Login Form Handler */
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault()
      const username = document.getElementById("username").value
      const password = document.getElementById("password").value
      const errorEl = document.getElementById("loginError")

      try {
        const response = await fetch(`${API_BASE}/api/admin-login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        })

        const data = await response.json()

        if (response.ok) {
          localStorage.setItem("adminToken", data.token)
          localStorage.setItem("adminUser", JSON.stringify(data.user))
          window.location.href = "admin.html"
        } else {
          errorEl.textContent = data.message || "Login failed"
        }
      } catch (err) {
        errorEl.textContent = "Error: " + err.message
      }
    })

    /* Forgot Password Form Handler */
    document.getElementById("forgotForm").addEventListener("submit", async (e) => {
      e.preventDefault()
      const username = document.getElementById("forgotUsername").value
      const errorEl = document.getElementById("forgotError")
      const successEl = document.getElementById("forgotSuccess")

      errorEl.textContent = ""
      successEl.textContent = ""

      try {
        const response = await fetch(`${API_BASE}/api/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username })
        })

        const data = await response.json()

        if (response.ok) {
          successEl.textContent = "Reset Token: " + data.resetToken + " (copy this)"
          document.getElementById("forgotForm").reset()
          setTimeout(showResetPassword, 2000)
        } else {
          errorEl.textContent = data.message || "Error"
        }
      } catch (err) {
        errorEl.textContent = "Error: " + err.message
      }
    })

    /* Reset Password Form Handler */
    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault()
      const username = document.getElementById("resetUsername").value
      const resetToken = document.getElementById("resetToken").value
      const newPassword = document.getElementById("newPassword").value
      const confirmPassword = document.getElementById("confirmPassword").value
      const errorEl = document.getElementById("resetError")
      const successEl = document.getElementById("resetSuccess")

      errorEl.textContent = ""
      successEl.textContent = ""

      if (newPassword !== confirmPassword) {
        errorEl.textContent = "Passwords do not match"
        return
      }

      try {
        const response = await fetch(`${API_BASE}/api/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, newPassword, resetToken })
        })

        const data = await response.json()

        if (response.ok) {
          successEl.textContent = "Password reset successfully! Redirecting to login..."
          document.getElementById("resetForm").reset()
          setTimeout(showLogin, 2000)
        } else {
          errorEl.textContent = data.message || "Error"
        }
      } catch (err) {
        errorEl.textContent = "Error: " + err.message
      }
    })
  </script>
</body>
</html>
