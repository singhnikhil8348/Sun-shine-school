<!DOCTYPE html>
<html>

<head>
<title>Admin Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-96">

<h2 class="text-2xl font-bold mb-6 text-center text-blue-700">
School Admin Login
</h2>

<input id="username" placeholder="Username" class="border p-2 mb-4 w-full rounded">

<input id="password" type="password" placeholder="Password" class="border p-2 mb-4 w-full rounded">

<button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded">
Login
</button>

</div>

<script src="js/config.js"></script>
<script>

const API_BASE_URL = window.API_BASE_URL || "http://localhost:5000"

async function login(){

const data = {
username: document.getElementById("username").value,
password: document.getElementById("password").value
}

try{

const res = await fetch(`${API_BASE_URL}/api/admin-login`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
})

const result = await res.json()

if(res.ok && result.token){

localStorage.setItem("adminToken",result.token)

window.location.href="admin.html"

}else{

alert(result.message || "Invalid username or password")

}

}catch(err){

alert("Server error")

}

}

</script>

</body>
</html>
